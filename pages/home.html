<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoHyek.dev</title>
    <link rel="stylesheet" href="/src/scroll.css" />
    <script type="module" src="../components/fadein/fade-in.js"></script>
    <script type="module" src="../components/home/canvasStar.js"></script>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/components/header/innerHeader.js"></script>
    <script type="module" src="/components/header/header.js"></script>
    <script type="module" src="/components/animations/animation.js"></script>
    <script type="module" src="/components/home/discordCopy.js"></script>
    <script type="module" src="/components/home/fadeInContents.js"></script>
  </head>
  <body class="scroll font-[A2Z-SemiBold]">
<!--메인-->
  <main id="main" class="maincontainer">
      <div id="fadeOverlay" class="z-9999" style="
      position: fixed;
      inset: 0;
      background: white;
      opacity: 1;
      transition: opacity 0.5s;
    "></div>
    <section id="canvasStar" class="relative z-13 w-full h-1000 bg-black">
      <div class="absolute text-white top-60 left-1/2 -translate-x-1/2 text-xl md:text-5xl animate-bounce [animation-duration:2s]">↓</div>
      <section class="absolute top-300 left-1/2 -translate-x-1/2 text-white scroll-reveal opacity-0 translate-y-10 delay-[0ms] rounded-2xl transition-all duration-700">
        <h1 class="md:text-5xl text-center text-sky-400">블로그</h1>
        <p class="md:text-2xl text-center mt-10">DoHyuk.dev</p>
      </section>
      <section class="absolute top-400 left-1/2 -translate-x-1/2 text-white scroll-reveal opacity-0 translate-y-10 delay-300ms rounded-2xl transition-all duration-700 flex gap-10 md:gap-30">
        <a class="relative w-max h-max" href="https://github.com/DoHyuk-Centric" rel="noopener noreferrer" target="_blank">
          <span class="absolute inset-0 rounded-full animate-ping bg-white opacity-30 [animation-duration:3s] [animation-delay:0s]"></span>
          <img class="w-6 h-6 md:w-12 md:h-12" src="../img/github.png" alt="깃허브 바로가기" />
        </a>
        <a class="relative w-max h-max" href="https://hyeeoooook.tistory.com/" rel="noopener noreferrer" target="_blank">
          <span class="absolute inset-0 rounded-full animate-ping bg-white opacity-30 [animation-duration:3s] [animation-delay:0.2s]"></span>
          <img class="w-6 h-6 md:w-12 md:h-12" src="../img/blog.png" alt="블로그 바로가기" />
        </a>
        <button id="discordCopy" class="relative w-max h-max cursor-pointer" data-copy="llsll_1211">
          <span class="absolute inset-0 rounded-full animate-ping bg-white opacity-30 [animation-duration:3s] [animation-delay:0.4s]"></span>
          <img class="w-6 h-6 md:w-12 md:h-12" src="../img/discord.png" alt="디스코드 아이디 복사" />
        </button>
      </section>
      <section class="absolute top-500 left-1/2 -translate-x-1/2 text-white scroll-reveal opacity-0 translate-y-10 delay-300ms rounded-2xl transition-all duration-700 flex">
        <nav>
          <ul class="flex gap-10 md:gap-30">
            <li class="duration-300 hover:scale-120">
              <a class="text-xl md:text-4xl hover:text-sky-500" href="../pages/about.html" rel="noopener noreferrer">
                ABOUT
              </a>
            </li>
            <li class="duration-300 hover:scale-120">
              <a class="text-xl md:text-4xl hover:text-sky-500" href="../pages/devLog.html" rel="noopener noreferrer">
                DEVLOG
              </a>
            </li>
          </ul>
        </nav>
      </section>
      <section class="absolute top-600 left-1/2 -translate-x-1/2 md:-translate-x-1/2 md:left-1/4 text-white scroll-reveal opacity-0 translate-y-10 delay-300ms rounded-2xl transition-all duration-700">
        <div class="max-w-200 h-20">
          <p class="text-nowrap">안녕하세요,</p>
          <p class="text-sm md:text-2xl text-nowrap"><span class="text-sky-400 text-xl md:text-4xl">프론트엔드</span> 개발자</p>
          <p class="text-end text-sm md:text-2xl">상상을 <span class="text-sky-400 text-lg md:text-3xl">현실로</span></p>
        </div>
      </section>
      <section class="absolute top-650 left-1/2 -translate-x-1/2 md:-translate-x-1/2 md:left-3/4 text-white scroll-reveal opacity-0 translate-y-10 delay-300ms rounded-2xl transition-all duration-700">
        <div class="max-w-200 h-20">
          <p class="text-end text-nowrap">긍정적인 마인드</p>
          <p class="text-sm md:text-2xl text-nowrap"><span class="text-sky-400 text-xl md:text-4xl">문제를 해결</span>하는 사람</p>
          <p class="text-sm md:text-2xl">생각을 <span class="text-sky-400 text-lg md:text-3xl">코드로</span></p>
        </div>
      </section>
      <section class="absolute top-750 left-1/2 -translate-x-1/2 text-white scroll-reveal opacity-0 translate-y-10 delay-300ms rounded-2xl transition-all duration-700">
        <div class="w-130 h-50 max-w-[90vw] rounded-xl overflow-hidden bg-[#1e1e1e] border border-white/10 shadow-xl font-mono">
          <div class="flex items-center gap-2 px-4 py-2 bg-[#2a2a2a]">
            <span class="w-3 h-3 bg-red-500 rounded-full"></span>
            <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
            <span class="w-3 h-3 bg-green-500 rounded-full"></span>
          </div>
          <div class="p-5 text-sm md:text-base leading-7">
            <p>
              <span class="text-green-400">visitor@blog</span>
              <span class="text-white"> ~ </span>
              <span class="text-blue-400">% </span>
              echo "블로그를 찾아주셔서 감사합니다"
            </p>
            <p class="mt-2">
              블로그를 찾아주셔서 감사합니다
              <span class="animate-pulse">█</span>
            </p>
          </div>
        </div>
    </section>
  </main>

  <footer class="footer flex bg-black text-gray-200">
      <div class="flex items-center gap-3 p-10">
        <img width="28" height="28" src="https://img.icons8.com/tiny-color/28/code.png" alt="홈페이지 로고" />
        <h1 class="text-xl">DoHyek.dev</h1>
      </div>
      <div class="p-10 grow text-right">
        <p>© 2026 개인 개발 블로그. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
