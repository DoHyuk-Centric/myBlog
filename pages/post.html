<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>개인 개발 블로그 - 게시글</title>
    <link rel="stylesheet" href="/src/scroll.css" />
    <link rel="stylesheet" href="/src/post-layout.css" />
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/components/header/innerHeader.js"></script>
    <script type="module" src="/components/header/header.js"></script>
    <script type="module" src="/components/post/postLoad.js"></script>
    <script type="module" src="/components/post/postDelete.js"></script>
    <script type="module" src="/components/post/postCorrectionButtonEvent.js"></script>
    <script type="module" src="/components/post/postMoreButtonEvent.js"></script>
  </head>

  <body class="scroll min-h-screen flex flex-col">
    <header id="header-placeholder"></header>

    <!--메인-->
    <main
      id="main"
      class="maincontainer bg-white dark:bg-gray-800 dark:text-gray-200 flex-1 pb-20"
    >
      <section class="post-layout">
        <article class="post-hero">
          <h1
            id="post-title"
            class="post-title text-2xl md:text-4xl mt-20 lg:mt-25 pb-2 lg:pb-5 bg-white dark:bg-gray-800 px-2 py-2 lg:px-10 lg:py-10 rounded-t-2xl"
          ></h1>
          <div class="post-subtitle pb-2 border-b-2 dark:border-b-4 bg-white dark:bg-gray-800 border-gray-200 border-dashed dark:border-solid dark:border-gray-700 px-2 lg:px-10">
            <div class="post-meta text-sm md:text-base">
              <p id="post-author" class="post-author"></p>
              <time id="post-date" class="post-date" datetime=""></time>
              <div id="correctionInfo" class="hidden text-gray-300 dark:text-gray-600 gap-2">
                <i class="">수정됨</i>
                <time datetime=""><i id="postCorrectionTime"></i></time>
              </div>
            </div>
            <div class="post-ButtonComponent relative">
              <div id="postMoreBtnEvent" class="post-moreComponentBtn bg-gray-50 rounded-2xl dark:bg-gray-800 flex flex-col gap-5 absolute w-15 h-25 justify-center duration-300 ease-out top-24 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0 hidden">
                <button id="postBtnCorrection_mobile" class="cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-600 rounded-xl" type="button">
                  수정
                </button>
                <button id="postBtnDelete_mobile" class="cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-600 rounded-xl" type="button">
                  삭제
                </button>
              </div>
              <button
                id="postMoreBtn"
                class="post-moreBtn cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-600 rounded-xl"
                type="button"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <circle cx="5" cy="12" r="2" />
                  <circle cx="12" cy="12" r="2" />
                  <circle cx="19" cy="12" r="2" />
                </svg>
              </button>
              <button id="postBtnCorrection_desk"
                class="post-correction cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-600 rounded-xl"
                type="button"
              >
                수정
              </button>
              <button
                id="postBtnDelete_desk"
                class="post-delete cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-600 rounded-xl"
                type="button"
              >
                삭제
              </button>
            </div>
          </div>
          <div class="post-body">
            <div
              id="post-content"
              class="post-content text-sm lg:text-base bg-white dark:bg-gray-800 rounded-b-2xl px-2 r prose max-w-none dark:prose-invert post-contents pt-2 lg:pt-12.5"
            ></div>
            <aside class="post-aside-right border-l-4 pl-5 border-gray-400 dark:border-gray-700">
              <div id="postAsideRight" class="text-xs flex flex-col gap-5 w-full">
                <!-- aside 영역 -->
              </div>
            </aside>
          </div>
        </article>
      </section>
    </main>
    <footer class="footer flex flex-col sm:flex-row sm:justify-between sm:p-5 dark:bg-gray-900 dark:text-white gap-2 p-2">
      <div class="flex items-center gap-3">
        <img class="invert dark:invert-0" width="28" height="28" src="../img/catpaw.svg" alt="홈페이지 로고" />
        <h4 class="text-sm md:text-lg lg:text-xl">DoHyek.dev</h4>
      </div>
      <p class="text-[10px] md:text-base sm:text-end">© 2026 개발 블로그. <span class="text-nowrap">All rights reserved.</span></p>
    </footer>
  </body>
</html>
