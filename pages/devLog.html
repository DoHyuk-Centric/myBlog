<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoHyek.dev - 회고록</title>
    <link rel="stylesheet" href="/src/scroll.css" />
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/components/devLog/fetchProfile.js"></script>
    <script type="module" src="/components/devLog/calendarYearBtn.js"></script>
    <script type="module" src="/components/header/innerHeader.js"></script>
    <script type="module" src="/components/header/header.js"></script>
    <script type="module" src="/components/devLog/calender.js"></script>
    <script type="module" src="/components/devLog/login/devLoginCheck.js"></script>
    <script type="module" src="/components/devLog/postUpdate.js"></script>
</head>

<body class="scroll font-[A2Z-SemiBold] min-h-screen flex flex-col">
    <!--메인-->
    <main id="main" class="maincontainer flex flex-col flex-1 bg-gray-100 dark:text-gray-200">
        <div class="text-gray-800 flex-1 flex flex-col relative w-full dark:bg-gray-800 p-2 lg:p-10 space-y-4 dark:text-white">
            <div class="lg:grid lg:grid-cols-3 w-full flex flex-col flex-1 gap-3 max-w-350 mx-auto mt-15 lg:mt-20">
                <aside class="border shadow-xl flex-1 bg-white dark:bg-gray-800 rounded-2xl col-span-2 p-3 lg:p-5">
                    <div class="flex border-gray-300 border-b items-center">
                        <h2 class="text-sm sm:text-xl lg:text-3xl pb-1">게시물</h2>
                        <a id="mobileWriteButton" class="lg:hidden ml-auto mr-2 text-sm sm:text-lg flex items-center gap-1 hover:bg-gray-200 dark:hover:bg-gray-700 px-1 pb-1 rounded-lg" href="/pages/postCreate.html">
                            <svg class="sm:w-5 sm:h-5 w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"></path></svg>
                            글쓰기
                        </a>
                    </div>
                    <ul id="posts-container" class="pt-2 p-1 lg:pt-3">
                        <li><!-- 카드 --></li>
                    </ul>
                </aside>

                <div class="hidden lg:flex flex-col gap-3 w-90">
                    <aside class="border shadow-xl rounded-2xl bg-white dark:bg-gray-800">
                    <div class="flex flex-col justify-center items-center gap-5 p-15">
                        <img id="profileImg" class="hidden flex w-60 h-60 border rounded-full" src="" alt="" />
                        <div id="sign_in">
                        <div class="text-center">
                            <h2 id="profileNickName" class="hidden text-bold text-3xl mb-3"></h2>
                            <p id="profileIntroduce" class="hidden text-gray-500 text-xl"></p>
                        </div>
                        </div>

                        <div id="DevLogActionSignedIn" class="hidden flex text-center leading-10 gap-4">
                        <a href="/pages/postCreate.html"
                            class="cursor-pointer border w-30 h-10 rounded-full border-gray-400 shadow-sm hover:bg-gray-300 bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600">글쓰기</a>
                        <a href="/pages/tempPost.html"
                            class="cursor-pointer border w-30 h-10 rounded-full border-gray-400 shadow-sm hover:bg-gray-300 bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600">임시 글</a>
                        </div>

                        <div id="DevLogActionSignedOut" class="hidden flex flex-col gap-4 text-center">
                        <p class="text-sm text-gray-400 dark:text-gray-500">
                            <span class="text-purple-400 dark:text-purple-600">로그인</span> 후 더 많은 기능을 이용해 보세요!
                        </p>
                        <div class="flex justify-center items-center gap-4 mt-5">
                            <a href="/pages/login.html"
                            class="cursor-pointer border text-center content-center w-30 h-10 rounded-full border-gray-400 shadow-sm hover:bg-gray-300 bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600">로그인</a>
                            <a href="/pages/signup.html"
                            class="cursor-pointer border text-center content-center w-30 h-10 rounded-full border-gray-400 shadow-sm hover:bg-gray-300 bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600">회원가입</a>
                        </div>
                        </div>
                    </div>
                    </aside>

                    <aside class="border shadow-xl rounded-2xl bg-white dark:bg-gray-800">
                    <div class="p-2">
                        <div class="border rounded-xl p-2 bg-gray-100 dark:bg-gray-700">
                        <div class="relative flex w-full z-10">
                            <button id="prevMonthBtn" class="rounded-xl w-10 cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-600">&lt;</button>
                            <div class="ml-auto flex gap-5 h-5 mb-2">
                            <button id="calendar_Year" class="hover:bg-gray-200 dark:hover:bg-gray-600 rounded-2xl cursor-pointer hover:scale-110 w-10 h-8 duration-500"></button>
                            <button id="calendar_Month" class="hover:bg-gray-200 dark:hover:bg-gray-600 rounded-2xl cursor-pointer hover:scale-110 w-10 h-8 duration-500"></button>
                            </div>
                            <button id="nextMonthBtn"
                            class="rounded-xl w-10 cursor-pointer justify-end ml-auto hover:bg-gray-300 dark:hover:bg-gray-600">&gt;</button>
                        </div>

                        <div id="calendar" class="relative w-full flex-col mt-2">
                            <div id="calendar_YearMonth_choice"
                            class="z-10 opacity-0 rounded-b-2xl h-0 w-full transition-all absolute dark:bg-gray-700 bg-gray-100 top-0 left-1/2 -translate-x-1/2 duration-500">
                            <div id="calendar_YearMonth_contents"
                                class="overflow-hidden flex justify-center items-center p-0 m-0 h-full max-w-full dark:text-white">
                                <div id="calendarYearcontents" class="flex place-items-center gap-5">
                                <button id="calendarYearLeftBtn" class="rounded-xl w-10 cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-600">&lt;</button>
                                <button id="calendarYearText" class="border cursor-pointer flex justify-center items-center border-gray-400 rounded-xl h-15 w-25"></button>
                                <button id="calendarYearRightBtn" class="rounded-xl w-10 cursor-pointer hover:bg-gray-300 dark:hover:bg-gray-600">&gt;</button>
                                </div>

                                <div id="calendarMonthcontents" class="hidden grid grid-cols-4 place-items-center gap-5">
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">1</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">2</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">3</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">4</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">5</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">6</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">7</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">8</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">9</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">10</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">11</span>월</button>
                                <button class="border border-gray-400 rounded-xl h-15 w-15 dark:hover:bg-gray-600 hover:bg-gray-300 cursor-pointer"><span class="choicemonth">12</span>월</button>
                                </div>
                            </div>
                            </div>

                            <div class="grid grid-cols-7 text-center mt-2 border-b border-gray-300 dark:border-gray-600 pb-2">
                            <div class="text-red-500 dark:text-red-400">일</div>
                            <div>월</div>
                            <div>화</div>
                            <div>수</div>
                            <div>목</div>
                            <div>금</div>
                            <div class="text-blue-500 dark:text-blue-400">토</div>
                            </div>

                            <div id="calendar_day" class="grid grid-cols-7 text-center gap-y-8 mt-2 mb-2">
                            <!-- 날짜 들어가는 곳 -->
                            </div>

                            <div id="calendarHoliday" class="holiday-info hidden mt-5 p-2 border-t border-gray-400 dark:border-gray-600 w-full flex gap-1">
                            <ul id="calendarHolidayInfo" class="pl-8 py-2 text-gray-600 dark:text-gray-400 flex flex-col gap-2 text-sm">
                            </ul>
                            </div>
                        </div>
                        </div>
                    </div>
                    </aside>
                </div>
            </div>
        </div>
     </main>
    <footer class="footer flex flex-col sm:flex-row sm:justify-between sm:p-5 dark:bg-gray-900 dark:text-white gap-2 p-2">
      <div class="flex items-center gap-3">
        <img class="invert dark:invert-0" width="28" height="28" src="../img/catpaw.svg" alt="홈페이지 로고" />
        <h4 class="text-sm md:text-lg lg:text-xl">DoHyek.dev</h4>
      </div>
      <p class="text-[10px] md:text-base sm:text-end">© 2026 개발 블로그. <span class="text-nowrap">All rights reserved.</span></p>
    </footer>

</body>

</html>
