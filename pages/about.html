  <body class="overflow-hidden font-[A2Z-SemiBold]">

      class="hidden xl:flex border bg-white dark:bg-gray-200 opacity-50 hover:opacity-100 duration-300 rounded-full w-12.5 h-37.5 gap-3 flex-col justify-center pr-2 items-end text-white fixed right-8 top-1/2 -translate-y-1/2 z-11"

        </section>
