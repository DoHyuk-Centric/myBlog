<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoHyuk.dev</title>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/index.js"></script>
    <script type="module" src="./components/login/loginState.js"></script>

  <body>
    <main
      class="relative w-screen h-screen bg-gray-800"
    >
      <div class="absolute w-full h-full top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 overflow-hidden">

          <span class="absolute inset-0 rounded-full animate-ping bg-white opacity-30 [animation-duration:3s]"></span>
          <img id="catPaw" class="w-10 h-10" src="../img/catpaw.svg" alt="메인이미지" />

      </div>
